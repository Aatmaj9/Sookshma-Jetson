services:
  sookshma:
    image: aatmaj9/sookshma-jetson:10.0
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    container_name: masv01
    working_dir: /workspaces/mavlab
    user: "mavlab"
    runtime: nvidia
    privileged: true
    network_mode: host
    shm_size: "2g"
    ipc: host
    pid: host
    stdin_open: true
    tty: true
    group_add:
      - dialout
      - video
      - plugdev
      - zed
      - render
      - "104"
    device_cgroup_rules:
      - 'c 166:* rmw'   # ttyACM*
      - 'c 188:* rmw'   # ttyUSB*
      - 'c 195:* rmw'   # nvidia devices
      - 'c 104:* rmw'   # DRI render nodes
    environment:
      - DISPLAY= $DISPLAY
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=1
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///workspaces/mavlab/.devcontainer/cyclonedds.xml
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    volumes:
      - ..:/workspaces/mavlab
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /tmp/argus_socket:/tmp/argus_socket
  rosbridge:
    image: aatmaj9/sookshma-jetson:10.0
    restart: unless-stopped
    container_name: masv01_rosbridge
    working_dir: /workspaces/mavlab
    user: "mavlab"
    privileged: true
    network_mode: host
    ipc: host
    pid: host
    stdin_open: true
    tty: true
    environment:
      - ROS_DOMAIN_ID=1
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///workspaces/mavlab/.devcontainer/cyclonedds.xml
    volumes:
      - ..:/workspaces/mavlab
    command: bash -ic "sros2 && scode && ros2 launch rosbridge_server rosbridge_websocket_launch.xml"